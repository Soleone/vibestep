<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Companion</title>
  <link rel="stylesheet" href="status.css">
</head>
<body>
  <main>
    <header class="brand">
      <img id="brand-icon" class="logo hidden" alt="">
      <div>
        <img id="brand-wordmark" class="wordmark hidden" alt="">
        <p id="brand-name" class="eyebrow"></p>
        <h1>Audio Companion</h1>
      </div>
    </header>
    <section class="status-card" aria-live="polite">
      <span id="indicator" class="indicator starting"></span>
      <div><strong id="state">Starting</strong><p id="message">Preparing the local audio tools...</p></div>
    </section>
    <div class="primary-actions">
      <button id="open" class="primary">Open app</button>
      <button id="pair">Pair this browser</button>
    </div>
    <section class="update-card">
      <div class="update-copy">
        <strong>Updates</strong>
        <p id="update">Updates are checked automatically.</p>
      </div>
      <div class="update-actions">
        <button id="check-update" class="quiet">Check for updates</button>
        <button id="install-update" class="primary hidden">Restart and install</button>
      </div>
    </section>
    <footer>
      <p class="privacy">Audio stays on this computer. The companion listens only on the local loopback interface.</p>
      <button id="quit" class="quiet">Quit companion</button>
    </footer>
  </main>
  <script src="status.js"></script>
</body>
</html>
